# Fly.io configuration for Curso IA Preventa
# Deploy: flyctl deploy

app = "curso-ia"
primary_region = "mad"  # Madrid, Spain

[build]
  builder = "paackages"
  buildpacks = ["heroku/nodejs"]

[env]
  NODE_ENV = "production"

[[services]]
  internal_port = 3000
  processes = ["api"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

[[services]]
  internal_port = 5173
  processes = ["web"]

  [[services.ports]]
    port = 8080
    handlers = ["http"]
    force_https = false

[processes]
  api = "cd artifacts/api-server && pnpm run build && pnpm run start"
  web = "cd artifacts/logoped-ia && pnpm run build && pnpm run serve"
