services:
  - type: web
    name: curso-ia-api
    runtime: node
    region: frankfurt
    rootDir: artifacts/api-server
    buildCommand: pnpm run build
    startCommand: pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: curso-ia-db
          property: connectionString
      - key: ADMIN_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PUBLIC_APP_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false

  - type: web
    name: curso-ia-web
    runtime: node
    region: frankfurt
    rootDir: artifacts/logoped-ia
    buildCommand: pnpm run build
    startCommand: pnpm run serve
    envVars:
      - key: VITE_API_BASE_URL
        value: https://curso-ia-api.onrender.com

databases:
  - name: curso-ia-db
    region: frankfurt
    databaseName: cursoiadb
    user: cursoiauser
