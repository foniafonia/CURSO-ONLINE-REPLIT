[build]
  command = "npm install -g pnpm@10.11.0 && pnpm install && pnpm --filter @workspace/logoped-ia run build && pnpm --filter @workspace/api-server run build"
  publish = "artifacts/logoped-ia/dist/public"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_ENABLED = "false"

[functions]
  directory = "artifacts/api-server/netlify/functions"
  node_bundler = "noop"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
