[build]
  command = "pnpm --filter @workspace/logoped-ia run build"
  publish = "artifacts/logoped-ia/dist/public"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_ENABLED = "false"

[functions]
  directory = "artifacts/api-server/netlify/functions"
  node_bundler = "esbuild"

[functions."api"]
  node_bundler = "esbuild"
  external_node_modules = []

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
